<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Listing | CampusMarket</title>
  <link rel="stylesheet" href="/styles/global.css" />
  <style>
    body {
      background: #f6f7fb;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-bottom: 10px;
      color: #0f2b5b;
    }

    .page-description {
      margin-bottom: 24px;
      color: #555;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1f2d3d;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d7dce5;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #0b4ea2;
      color: white;
    }

    .btn-secondary {
      background: #e9eef7;
      color: #0f2b5b;
    }

    .message {
      margin-top: 18px;
      font-weight: 600;
      min-height: 22px;
    }

    .success {
      color: green;
    }

    .error {
      color: crimson;
    }

    .image-note {
      margin-top: 6px;
      font-size: 13px;
      color: #666;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="pageTitle">Create New Listing</h1>
    <p id="pageDescription" class="page-description">
      Fill in the details below to add an item for sale or trade.
    </p>

    <form id="createListingForm">
      <div class="form-group">
        <label for="title">Item Title</label>
        <input type="text" id="title" name="title" required />
      </div>

      <div class="form-group">
        <label for="price">Price (R)</label>
        <input type="number" id="price" name="price" min="0" step="0.01" required />
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="">Select category</option>
          <option value="Textbooks">Textbooks</option>
          <option value="Electronics">Electronics</option>
          <option value="Furniture">Furniture</option>
          <option value="Clothing">Clothing</option>
          <option value="Appliances">Appliances</option>
          <option value="Stationary">Stationary</option>
          <option value="Tickets">Tickets</option>
          <option value="Miscellaneous">Miscellaneous</option>
        </select>
      </div>

      <div class="form-group">
        <label for="condition">Condition</label>
        <select id="condition" name="condition" required>
          <option value="">Select condition</option>
          <option value="New">New</option>
          <option value="Good">Good</option>
          <option value="Fair">Fair</option>
          <option value="Worn">Worn</option>
          <option value="Damaged">Damaged</option>
        </select>
      </div>

      <div class="form-group">
        <label for="sale_type">Sale Type</label>
        <select id="sale_type" name="sale_type" required>
          <option value="">Select sale type</option>
          <option value="Sale">Sale</option>
          <option value="Trade">Trade</option>
          <option value="Either">Either</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" required></textarea>
      </div>

      <div class="form-group" id="imageGroup">
        <label for="image">Listing Image</label>
        <input type="file" id="image" name="image" accept="image/*" required />
        <p id="imageNote" class="image-note hidden">
          Leave the image empty if you want to keep the current image.
        </p>
      </div>

      <div class="actions">
        <button id="submitBtn" type="submit" class="btn btn-primary">Save Listing</button>
        <a href="/dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
  <button id="deleteBtn" type="button" class="btn btn-secondary hidden">
    Delete Listing
  </button>
      </div>

      <div id="formMessage" class="message"></div>
    </form>
  </div>

  <script>
    async function checkAuth() {
      try {
        const res = await fetch("/auth/me", {
          credentials: "include"
        });

        if (!res.ok) {
          window.location.href = "/login.html";
          return;
        }
      } catch {
        window.location.href = "/login.html";
      }
    }

    checkAuth();

    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");
    const listingId = params.get("id");

    if (mode === "edit" && listingId) {
      document.title = "Edit Listing | CampusMarket";
      document.getElementById("pageTitle").textContent = "Edit Listing";
      document.getElementById("pageDescription").textContent =
        "Update the details below for your listing.";
      document.getElementById("submitBtn").textContent = "Update Listing";

      const imageInput = document.getElementById("image");
      imageInput.required = false;

      document.getElementById("imageNote").classList.remove("hidden");
    }
  </script>

  <script type="module" src="/scripts/create-listing.js"></script>
</body>
</html>
