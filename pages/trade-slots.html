<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Trade Slots | Campus Marketplace</title>

        <link rel="stylesheet" href="/styles/global.css" />
        <link rel="stylesheet" href="/styles/slots.css" />
    </head>

    <body>
        <aside class="sidebar">
            <div class="sidebar-logo">
                Campus<span class="highlight">Market</span>
            </div>

            <nav class="nav-list">
                <a href="/dashboard.html" class="nav-item">🏠 Dashboard</a>
                <a href="/trade-slots.html" class="nav-item active"
                    >📅 Trade Slots</a
                >
                <a href="/my-listings.html" class="nav-item">📦 My Listings</a>
                <a href="/messages.html" class="nav-item">💬 Messages</a>
                <a href="/rate-user.html" class="nav-item">⭐ Ratings</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1>Trade Slots</h1>
                <p class="text-muted">
                    View the slots that have been made available by the facility
                    staff.
                </p>
            </header>

            <section class="slot-controls">
                <label for="slot-date">Select date:</label>
                <input type="date" id="slot-date" />
            </section>

            <div id="feedback-message" class="feedback-message"></div>

            <section id="slots-container">
                <p class="loading-text">Loading available slots...</p>
            </section>
        </main>

        <script src="/scripts/slots.js"></script>
    </body>
</html>
