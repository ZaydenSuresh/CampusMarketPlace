<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Trade Slots | Campus Marketplace</title>
        <link rel="stylesheet" href="../styles/global.css" />
        <style>
            body {
                display: flex;
                min-height: 100vh;
                background-color: var(--bg-light);
                color: var(--text-dark);
            }

            /* Sidebar - Consistent with Dashboard & Login Panel */
            .sidebar {
                width: 280px;
                background: var(--clr-bg-gradient);
                color: var(--white);
                display: flex;
                flex-direction: column;
                padding: var(--space-xl);
                position: fixed;
                height: 100vh;
                box-shadow: var(--shadow-lg);
                z-index: 100;
            }

            .sidebar-logo {
                font-size: 1.5rem;
                font-weight: 800;
                margin-bottom: var(--space-2xl);
            }

            .sidebar-logo .highlight {
                color: var(--wits-gold);
            }

            .nav-list {
                display: flex;
                flex-direction: column;
                gap: var(--space-sm);
            }

            .nav-item {
                display: flex;
                align-items: center;
                padding: var(--space-md);
                border-radius: var(--radius-md);
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.1);
                transition: all var(--transition-normal);
                font-weight: 600;
                font-size: 0.9rem;
                color: var(--white);
            }

            .nav-item:hover,
            .nav-item.active {
                background: rgba(255, 255, 255, 0.2);
                border-color: var(--wits-gold);
                transform: translateX(5px);
            }

            /* Main Content */
            .main-content {
                margin-left: 280px;
                flex: 1;
                padding: var(--space-2xl);
            }

            .page-header {
                margin-bottom: var(--space-2xl);
            }

            .page-header h1 {
                color: var(--wits-navy-dark);
                font-size: 1.75rem;
                font-weight: 800;
                margin-bottom: var(--space-xs);
            }

            /* Slots Grid - Target for slots.js */
            #slots-container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: var(--space-lg);
            }

            /* Slot Card Styling - Mimicking the Login Card aesthetic */
            .slot-card {
                background: var(--white);
                padding: var(--space-xl);
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-sm);
                border: 1px solid var(--grey-border);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                transition: var(--transition-normal);
                position: relative;
                overflow: hidden;
            }

            .slot-card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 4px;
                height: 100%;
                background: var(--wits-gold);
            }

            .slot-card:hover {
                box-shadow: var(--shadow-md);
                transform: translateY(-3px);
                border-color: var(--wits-gold-light);
            }

            .slot-card p {
                margin: 0;
                font-size: 0.95rem;
                line-height: 1.6;
            }

            .slot-card strong {
                color: var(--wits-navy-dark);
                display: block;
                font-size: 1.1rem;
                margin-bottom: var(--space-xs);
            }

            /* Button Styling - Matches submit-btn from login.html */
            .slot-card button {
                margin-top: var(--space-lg);
                width: 100%;
                padding: 12px;
                background-color: var(--wits-navy);
                color: var(--white);
                border: none;
                border-radius: var(--radius-pill);
                font-weight: 700;
                font-size: 0.9rem;
                cursor: pointer;
                transition: all var(--transition-fast);
            }

            .slot-card button:hover {
                background-color: var(--wits-navy-dark);
                box-shadow: 0 4px 12px rgba(0, 59, 126, 0.25);
            }

            /* Loading state text */
            .loading-text {
                color: var(--grey-text);
                font-style: italic;
                grid-column: 1 / -1;
                text-align: center;
                padding: var(--space-2xl);
            }

            @media (max-width: 968px) {
                .sidebar {
                    width: 80px;
                    padding: var(--space-md);
                }
                .sidebar-logo,
                .nav-item span {
                    display: none;
                }
                .main-content {
                    margin-left: 80px;
                }
            }

            .slot-controls {
                margin-bottom: var(--space-lg);
                display: flex;
                align-items: center;
                gap: 12px;
                flex-wrap: wrap;
            }

            .slot-controls label {
                font-weight: 700;
                color: var(--wits-navy-dark);
            }

            .slot-controls input[type="date"] {
                padding: 10px 12px;
                border: 1px solid var(--grey-border);
                border-radius: var(--radius-md);
                background: var(--white);
                font: inherit;
            }

            .feedback-message {
                display: none;
                margin-bottom: var(--space-lg);
                padding: 12px 16px;
                border-radius: var(--radius-md);
                font-weight: 600;
                max-width: 500px;
            }

            .feedback-message.success {
                display: block;
                background: #dff6e5;
                color: #1f7a3d;
                border: 1px solid #9fdbaf;
            }

            .feedback-message.error {
                display: block;
                background: #fde2e2;
                color: #a12626;
                border: 1px solid #f3b0b0;
            }
        </style>
    </head>
    <body>
        <aside class="sidebar">
            <div class="sidebar-logo">
                Campus<span class="highlight">Market</span>
            </div>
            <nav class="nav-list">
                <a href="dashboard.html" class="nav-item">
                    <span>🏠 Dashboard</span>
                </a>
                <a href="trade-slots.html" class="nav-item active">
                    <span>📅 Trade Slots</span>
                </a>
                <a href="#" class="nav-item">
                    <span>📦 My Listings</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1>Trade Slot Booking</h1>
                <p class="text-muted">
                    Choose a secure time and location on campus to exchange your
                    items.
                </p>
            </header>

            <section class="slot-controls">
                <label for="slot-date">Select date:</label>
                <input type="date" id="slot-date" />
            </section>

            <div id="feedback-message" class="feedback-message"></div>

            <div id="slots-container">
                <p class="loading-text">
                    Connecting to campus safety server...
                </p>
            </div>
        </main>

        <script src="../scripts/slots.js"></script>
    </body>
</html>
