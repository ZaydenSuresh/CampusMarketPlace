<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Transaction | CampusMarket</title>
  <link rel="stylesheet" href="/styles/global.css" />
  <style>
    body {
      background: #f6f7fb;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-bottom: 10px;
      color: #0f2b5b;
    }

    .page-description {
      margin-bottom: 24px;
      color: #555;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1f2d3d;
    }

    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d7dce5;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
      background: white;
    }

    .selected-item {
      background: #f0f4ff;
      border: 1px solid #d0d9f0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 4px;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .selected-item img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      border-radius: 8px;
      background: white;
    }

    .selected-item .info {
      flex: 1;
    }

    .selected-item .info h3 {
      font-size: 1rem;
      color: #0f2b5b;
      margin-bottom: 4px;
    }

    .selected-item .info span {
      font-size: 0.85rem;
      color: #666;
    }

    /* Date input */
    .date-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d7dce5;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    /* Time cards grid */
    .time-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .time-card {
      background: #f6f7fb;
      border: 2px solid #e0e3e8;
      border-radius: 10px;
      padding: 14px 20px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-width: 110px;
      flex: 1 0 auto;
    }

    .time-card:hover {
      border-color: #a0aab8;
    }

    .time-card.selected {
      border-color: #0f2b5b;
      background: #f0f4ff;
      box-shadow: 0 2px 8px rgba(15, 43, 91, 0.15);
    }

    .time-card .time {
      font-size: 1rem;
      font-weight: 700;
      color: #0f2b5b;
    }

    .time-card .remaining {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }

    .time-card.selected .remaining {
      color: #555;
    }

    /* Summary line */
    .summary-line {
      background: #faf8f0;
      border: 1px solid #e8dfc8;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 18px;
      display: none;
    }

    .summary-line strong {
      color: #0f2b5b;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #0f2b5b;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #1a3f7a;
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .message.success {
      display: block;
      background: #d1fae5;
      color: #065f46;
    }

    .loading-text {
      color: #999;
      font-size: 0.9rem;
      padding: 8px 0;
    }

    .empty-text {
      color: #999;
      font-size: 0.9rem;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="pageTitle">New Transaction</h1>
    <p class="page-description" id="pageDescription">Select a reserved item and book a trade slot.</p>

    <form id="transactionForm">
      <div class="form-group" id="item-field">
        <label for="itemSelect">Reserved Item</label>
        <select id="itemSelect">
          <option value="">Loading items...</option>
        </select>
      </div>

      <div id="selected-item-preview" class="selected-item" style="display: none">
        <img id="previewImg" src="" alt="" />
        <div class="info">
          <h3 id="previewTitle"></h3>
          <span id="previewDetail"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="dateInput">Select Date</label>
        <input type="date" id="dateInput" class="date-input" />
      </div>

      <div class="form-group">
        <label>Available Times</label>
        <div id="timeGrid" class="time-grid">
          <span class="empty-text">Pick a date to see available times.</span>
        </div>
      </div>

      <div id="summaryLine" class="summary-line"></div>

      <button type="submit" class="submit-btn" id="submitBtn">Book Slot & Create Transaction</button>
    </form>

    <div id="formMessage" class="message"></div>
  </div>

  <script type="module" src="/scripts/create-transaction.js"></script>
</body>
</html>
