<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Transactions | Campus Marketplace</title>

        <link rel="stylesheet" href="/styles/global.css" />
        <link rel="stylesheet" href="/styles/student-transactions.css" />
    </head>
    <body>
        <aside class="sidebar">
            <div class="sidebar-logo">
                Campus<span class="highlight">Market</span>
            </div>

            <nav class="nav-list">
                <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
                <a href="my-listings.html" class="nav-item">📦 My Listings</a>
                <a href="student-transactions.html" class="nav-item active"
                    >📋 My Transactions</a
                >
                <a href="messages.html" class="nav-item">💬 Messages</a>
            </nav>

            <footer class="sidebar-footer">
                <button type="button" id="logout-btn" class="logout-btn">
                    Logout
                </button>
            </footer>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1>My Transactions</h1>
                    <p>View and manage your marketplace transactions</p>
                </div>
                <div class="header-actions">
                    <button
                        class="action-btn"
                        onclick="
                            window.location.href = '/create-transaction.html'
                        "
                    >
                        + New Transaction
                    </button>
                </div>
            </header>

            <section class="status-tabs" id="status-tabs">
                <span class="filter-label">Transaction Status:</span>
                <button class="tab-btn active" data-status="all">All</button>
                <button class="tab-btn" data-status="pending">Pending</button>
                <button class="tab-btn" data-status="in_progress">
                    In Progress
                </button>
                <button class="tab-btn" data-status="completed">
                    Completed
                </button>
                <button class="tab-btn" data-status="cancelled">
                    Cancelled
                </button>
            </section>

            <section class="filters-row" id="type-filters">
                <span class="filter-label">Transaction Type:</span>
                <button class="filter-pill active" data-type="all">All</button>
                <button class="filter-pill" data-type="sale">Sale</button>
                <button class="filter-pill" data-type="trade">Trade</button>
            </section>

            <section id="transactions-container" class="transactions-container">
                <div class="empty-state">
                    <h3>Loading transactions...</h3>
                </div>
            </section>
        </main>

        <script type="module" src="/scripts/student-transactions.js"></script>
    </body>
</html>
