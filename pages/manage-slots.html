<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage Trade Slots | Campus Marketplace</title>

<link rel="stylesheet" href="/styles/global.css" />
<link rel="stylesheet" href="/styles/slots.css" />
</head>

<body>

<script type="module">
import { requireRole } from "/scripts/auth.js";

async function checkAccess() {
    const user = await requireRole(["Trade Facility Staff"]);
    if (!user) return;
}
checkAccess();
</script>

<aside class="sidebar">

<header class="brand">
    <h1>Wits Marketplace</h1>
    <p>Staff Portal</p>
</header>

<nav class="sidebar-nav">

    <a href="/dashboard.html" class="nav-link">
        📊 Dashboard
    </a>

    <a href="/manage-slots.html" class="nav-link active">
        📅 Manage Slots
    </a>

    <a href="/transactions.html" class="nav-link">
        💳 Transactions
    </a>

</nav>

<footer class="sidebar-footer">
    <a href="/login.html" class="logout-btn">
        ↩ Logout
    </a>
</footer>

</aside>

<main class="main-content">

<header class="top-header">
    <h2>Manage Trade Slots</h2>
    <p>Schedule and manage marketplace trade time slots</p>
</header>

<section class="stats-grid">

    <article class="stat-card">
        <span>Total Slots</span>
        <strong id="stat-total">0</strong>
    </article>

    <article class="stat-card">
        <span>Fully Booked</span>
        <strong id="stat-booked">0</strong>
    </article>

    <article class="stat-card">
        <span>Open Slots</span>
        <strong id="stat-open">0</strong>
    </article>

    <article class="stat-card">
        <span>Total Bookings</span>
        <strong id="stat-capacity">0</strong>
    </article>

</section>

<section class="action-bar">

<form id="create-slot-form" class="slot-form">

<section class="form-inputs">

<input
type="date"
id="slot-date"
required
/>

<select
id="slot-time"
required>
</select>

<input
type="number"
id="slot-capacity"
placeholder="Capacity"
min="1"
required
/>

</section>

<button type="submit">
＋ Create New Slot
</button>

</form>

<section class="filter-bar">

<select id="status-filter" class="filter-select">
<option value="">All Status ▼</option>
<option value="available">Available</option>
<option value="full">Full</option>
</select>

</section>

</section>

<section
id="feedback-message"
class="feedback-message">
</section>

<section class="slots-section">

<header class="section-head">
<h3>Existing Slots</h3>
</header>

<section class="slots-table-container">

<table class="slots-table">

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Capacity</th>
<th>Booked</th>
<th>Remaining</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="slots-table-body">

<tr>
<td colspan="7" class="loading-text">
Loading slots...
</td>
</tr>

</tbody>

</table>

</section>

</section>

</main>

<script src="/scripts/manage-slots.js"></script>

</body>
</html>
