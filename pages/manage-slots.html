<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage Trade Slots | Campus Marketplace</title>

<link rel="stylesheet" href="/styles/global.css" />
<link rel="stylesheet" href="/styles/slots.css" />
</head>

<body>

<script type="module">
import { requireRole } from "/scripts/auth.js";

async function checkAccess() {
    const user = await requireRole(["Trade Facility Staff"]);
    if (!user) return;
}
checkAccess();
</script>

<aside class="sidebar">

<header class="brand">
    <h1>Wits Marketplace</h1>
    <p>Staff Portal</p>
</header>

<nav class="sidebar-nav">
    <a href="/dashboard.html" class="nav-link">🏠 Dashboard</a>

    <a href="/manage-slots.html" class="nav-link active">
        📅 Manage Slots
    </a>

    <a href="#" class="nav-link">
        💳 Transactions
    </a>
</nav>

<footer class="sidebar-footer">
    <a href="/login.html" class="logout-btn">↩ Logout</a>
</footer>

</aside>

<main class="main-content">

<header class="top-header">
<section>
<h2>Manage Trade Slots</h2>
<p>Schedule and manage marketplace booking slots</p>
</section>
</header>

<section class="stats-grid">

<article class="stat-card">
<span>Total Slots</span>
<strong id="stat-total">0</strong>
</article>

<article class="stat-card">
<span>Booked</span>
<strong id="stat-booked">0</strong>
</article>

<article class="stat-card">
<span>Open</span>
<strong id="stat-open">0</strong>
</article>

<article class="stat-card">
<span>Total Capacity</span>
<strong id="stat-capacity">0</strong>
</article>

</section>

<section class="action-bar">

<form id="create-slot-form" class="slot-form">

<input type="date" id="slot-date" required />

<input type="time" id="slot-time" required />

<input
type="number"
id="slot-capacity"
placeholder="Capacity"
min="1"
required
/>

<button type="submit">＋ Create Slot</button>

</form>

</section>

<section id="feedback-message" class="feedback-message"></section>

<section class="slots-section">

<header class="section-head">
<h3>Existing Slots</h3>
</header>

<section id="staff-slots-container" class="slots-grid">
<p class="loading-text">Loading slots...</p>
</section>

</section>

</main>

<script src="/scripts/manage-slots.js"></script>

</body>
</html>
