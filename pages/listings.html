<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Marketplace</title>

  <link rel="stylesheet" href="/styles/global.css"/>
  <link rel="stylesheet" href="/styles/listing.css"/>
</head>

<body class="listings-page">
  <main class="listings-main">

    <a href="/dashboard" class="back-btn">&#8592; Dashboard</a>

    <section class="listings-hero">
      <header>
        <h1 class="listings-hero__title">
          Campus<span class="highlight">Market</span> 🎓
        </h1>
        <p class="listings-hero__subtitle">
          Buy, sell, and trade with fellow students. Safe, secure, and convenient.
        </p>
      </header>
    </section>

    <section class="listings-toolbar">
      <input
        id="searchInput"
        class="search-input"
        type="search"
        placeholder="Search listings..."
      />
    </section>

    <nav class="category-filters">
      <button class="filter-pill active" type="button" data-category="All">All</button>
      <button class="filter-pill" type="button" data-category="Textbooks">Textbooks</button>
      <button class="filter-pill" type="button" data-category="Electronics">Electronics</button>
      <button class="filter-pill" type="button" data-category="Clothing">Clothing</button>
      <button class="filter-pill" type="button" data-category="Furniture">Furniture</button>
    </nav>

    <p id="listingsCount" class="listings-count">Loading listings...</p>

    <section id="listingsGrid" class="listings-grid"></section>

  </main>

  <script>
    const MOCK_LISTINGS = [
      {
        id: 1,
        title: "MacBook Air M2 (2023)",
        description: "13-inch MacBook Air with M2 chip, 8GB RAM, 256GB SSD. Barely used, still under warranty.",
        price: 8999,
        category: "Electronics",
        condition: "Like New",
        user_id: 101,
        location: "North Campus"
      },
      {
        id: 2,
        title: "Calculus Textbook – 11th Edition",
        description: "Excellent condition calculus textbook. Used for one semester only. Includes practice problems.",
        price: 450,
        category: "Textbooks",
        condition: "Good",
        user_id: 102,
        location: "West Campus"
      },
      {
        id: 3,
        title: "Chemistry Lab Coat & Safety Goggles",
        description: "Standard lab coat (size M) and safety goggles. Required for CHEM 101. Only worn twice.",
        price: 180,
        category: "Clothing",
        condition: "Like New",
        user_id: 103,
        location: "South Campus"
      },
      {
        id: 4,
        title: "Study Desk & Chair",
        description: "Compact wooden desk with a matching chair. Perfect for a dorm room. Minor scuff on desk leg.",
        price: 1200,
        category: "Furniture",
        condition: "Good",
        user_id: 104,
        location: "Braamfontein"
      },
      {
        id: 5,
        title: "iPhone 13 Pro – 128GB",
        description: "iPhone 13 Pro in graphite color. Some minor scratches on the back, but screen is perfect.",
        price: 5500,
        category: "Electronics",
        condition: "Good",
        user_id: 105,
        location: "North Campus"
      },
      {
        id: 6,
        title: "Introduction to Psychology – 4th Ed.",
        description: "Lightly highlighted. All chapters intact. Great for first-year psych students.",
        price: 300,
        category: "Textbooks",
        condition: "Fair",
        user_id: 106,
        location: "East Campus"
      },
      {
        id: 7,
        title: "Mini Fridge – 60L",
        description: "Compact fridge ideal for dorm use. Runs quietly, keeps things cold. Selling due to moving out.",
        price: 950,
        category: "Furniture",
        condition: "Good",
        user_id: 107,
        location: "South Campus"
      }
    ];

    let allListings = [...MOCK_LISTINGS];
    let activeCategory = "All";

    document.addEventListener('DOMContentLoaded', () => {
      renderListings(allListings);

      document.getElementById('searchInput').addEventListener('input', handleFilter);

      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeCategory = btn.dataset.category;
          handleFilter();
        });
      });
    });

    function handleFilter() {
      const query = document.getElementById('searchInput').value.toLowerCase();

      const filtered = allListings.filter(l => {
        const matchesCategory = activeCategory === "All" || l.category === activeCategory;
        const matchesSearch =
          (l.title || '').toLowerCase().includes(query) ||
          (l.description || '').toLowerCase().includes(query);
        return matchesCategory && matchesSearch;
      });

      renderListings(filtered);
    }

    function renderListings(listings) {
      const grid = document.getElementById('listingsGrid');
      const count = document.getElementById('listingsCount');

      count.textContent = `Showing ${listings.length} item${listings.length !== 1 ? 's' : ''}`;

      if (!listings.length) {
        grid.innerHTML = '<p class="empty-state">No listings found.</p>';
        return;
      }

      grid.innerHTML = listings.map(listing => `
        <article class="listing-card">
          <div class="listing-card__img-wrap"></div>

          <section class="listing-card__body">
            <div class="listing-card__meta">
              <span class="badge">${escapeHtml(listing.category)}</span>
            </div>

            <h3 class="listing-card__title">${escapeHtml(listing.title)}</h3>

            <p class="listing-card__desc">${truncate(listing.description || '', 90)}</p>

            <div class="listing-card__condition">${escapeHtml(listing.condition)}</div>

            <footer class="listing-card__footer">
              <span class="listing-card__location">&#128205; ${escapeHtml(listing.location)}</span>
              <strong class="listing-card__price">R ${listing.price.toLocaleString()}</strong>
            </footer>
          </section>
        </article>
      `).join('');
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function truncate(text, maxLength) {
      const value = String(text || '');
      return value.length > maxLength
        ? value.slice(0, maxLength).trim() + '...'
        : value;
    }
  </script>
</body>
</html>
