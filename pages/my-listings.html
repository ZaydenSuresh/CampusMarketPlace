<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Listings | Campus Marketplace</title>

        <link rel="stylesheet" href="/styles/global.css" />

        <style>
            body {
                display: flex;
                min-height: 100vh;
                background-color: var(--bg-light);
            }

            .sidebar {
                width: 280px;
                background: var(--clr-bg-gradient);
                color: var(--white);
                display: flex;
                flex-direction: column;
                padding: var(--space-xl);
                position: fixed;
                height: 100vh;
                box-shadow: var(--shadow-lg);
            }

            .sidebar-logo {
                font-size: 1.5rem;
                font-weight: 800;
                margin-bottom: var(--space-2xl);
                color: var(--white);
            }

            .sidebar-logo .highlight {
                color: var(--wits-gold);
            }

            .nav-list {
                display: flex;
                flex-direction: column;
                gap: var(--space-sm);
            }

            .nav-item {
                display: flex;
                align-items: center;
                padding: var(--space-md);
                border-radius: var(--radius-md);
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.1);
                transition: all var
                font-weight: 600;
                font-size: 0.9rem;
                text-decoration: none;
                color: white;
            }

            .nav-item:hover,
            .nav-item.active {
                background: rgba(255, 255, 255, 0.2);
                border-color: var(--wits-gold);
                transform: translateX(5px);
            }

            /* --- MAIN CONTENT STYLES --- */
            .main-content {
                margin-left: 280px;
                flex: 1;
                padding: var(--space-2xl);
            }

            .dashboard-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 16px;
                margin-bottom: var(--space-2xl);
            }

            .listings-container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: var(--space-lg);
            }

            /* Card Action Container - Pushes button to bottom right */
            .card-actions {
                display: flex;
                justify-content: flex-end; /* Align button to the right */
                padding: 15px;
                margin-top: auto; /* Push to the very bottom of the card */
            }

            /* Red Delete Button - Smaller "pill" style */
            .delete-btn-styled {
                background-color: #A51C30; /* Red accent */
                color: white;
                border: none;
                padding: 6px 16px;
                border-radius: 20px; /* Rounded pill shape */
                font-weight: 600;
                font-size: 0.8rem;
                cursor: pointer;
                transition: transform 0.2s, background-color 0.2s;
            }

            .delete-btn-styled:hover {
                background-color: #821627;
                transform: scale(1.05);
            }

            .toast {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%); /* Precise screen centering */
                padding: 20px 40px;
                border-radius: var(--radius-md);
                z-index: 9999;
                font-weight: 700;
                text-align: center;
                box-shadow: 0 10px 30px rgba(0,0,0,0.4);
                background-color: #003B5C; /* Wits Navy */
                color: #FFFFFF;
                animation: toastPop 0.3s ease-out;
            }

            .toast-error { border-bottom: 4px solid #A51C30; } /* Red for Error */
            .toast-success { border-bottom: 4px solid #D4AF37; } /* Gold for Success */

            @keyframes toastPop {
                from { opacity: 0; transform: translate(-50%, -60%); }
                to { opacity: 1; transform: translate(-50%, -50%); }
            }
            .sidebar-footer {
                margin-top: auto;
                padding-top: var(--space-lg);
            }

            .logout-btn {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: var(--space-sm);
                padding: var(--space-md);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: var(--radius-md);
                background: rgba(255, 255, 255, 0.08);
                color: var(--white);
                font-size: 0.9rem;
                font-weight: 600;
                cursor: pointer;
            }
        </style>
    </head>

    <body>
        <aside class="sidebar">
            <div class="sidebar-logo">
                Campus<span class="highlight">Market</span>
            </div>

            <nav class="nav-list">
                <a href="/dashboard.html" class="nav-item">🏠 Dashboard</a>
                <a href="/my-listings.html" class="nav-item active"
                    >📦 My Listings</a
                >
                <a href="/student-transactions.html" class="nav-item"
                    >📋 My Transactions</a
                >
                <a href="/messages.html" class="nav-item">💬 Messages</a>
            </nav>

            <footer class="sidebar-footer">
                <button type="button" id="logout-btn" class="logout-btn">
                    Logout
                </button>
            </footer>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <section>
                    <h1>My Listings</h1>
                    <p>
                        Manage and track the items you have posted for sale or
                        trade.
                    </p>
                </section>
            </header>

            <section class="filter-bar" style="margin-bottom: 20px">
                <label for="status-filter" style="font-weight: 600"
                    >Filter by Status:
                </label>
                <select
                    id="status-filter"
                    style="
                        padding: 8px;
                        border-radius: 5px;
                        border: 1px solid #ccc;
                    "
                >
                    <option value="All">All Listings</option>
                    <option value="available">Available</option>
                    <option value="reserved">Reserved</option>
                    <option value="sold">Sold</option>
                </select>
            </section>

            <div class="listings-container" id="my-listings-container">
                <p>Loading your listings...</p>
            </div>
        </main>

        <script type="module" src="/scripts/my-listings.js"></script>
    </body>
</html>
